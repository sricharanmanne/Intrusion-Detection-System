<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Accuracy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            background-color: #f8f9fa;
        }
        nav {
            width: 240px;
            background-color: #e9ecef;
            padding: 2rem 1rem;
        }
        main {
            flex-grow: 1;
            padding: 2rem;
        }
        img.chart {
            max-width: 100%;
            height: auto;
            border: 1px solid #dee2e6;
            padding: 0.5rem;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <nav class="d-flex flex-column">
        <h4 class="mb-4 text-secondary">Navigation</h4>
        <ul class="nav flex-column">
            <li class="nav-item mb-2"><a class="nav-link text-dark" href="/">Dashboard</a></li>
            <li class="nav-item mb-2"><a class="nav-link text-dark" href="/predicted_accuracy">Graphs</a></li>
            <li class="nav-item mb-2"><a class="nav-link text-dark" href="/history">History</a></li>
        </ul>
    </nav>

    <main>
        <h2 class="mb-4 text-dark">Prediction Accuracy Charts</h2>

        <div class="mb-5">
            <h5 class="mb-3 text-muted">Distribution of Prediction Results</h5>
            <img src="data:image/png;base64,{{ pie_chart }}" alt="Pie Chart" class="chart img-fluid rounded shadow-sm">
        </div>

        <div>
            <h5 class="mb-3 text-muted">Prediction Score Trend</h5>
            <img src="data:image/png;base64,{{ line_chart }}" alt="Line Chart" class="chart img-fluid rounded shadow-sm">
        </div>
    </main>
</body>
</html>
